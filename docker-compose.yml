services:
  db:
    image: postgres:16-alpine
    container_name: url-shortener-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-url_shortener}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-url_shortener}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: url-shortener-redis
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: url-shortener-api
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      API_PORT: 3000
      API_BASE_URL: ${API_BASE_URL:-http://localhost:3000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://127.0.0.1:5173}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: ${API_DATABASE_URL:-postgresql://postgres:postgres@db:5432/url_shortener}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_CACHE_TTL_SECONDS: ${REDIS_CACHE_TTL_SECONDS:-86400}
      REDIS_STREAM_NAME: ${REDIS_STREAM_NAME:-clicks}
      REDIS_STREAM_MAXLEN: ${REDIS_STREAM_MAXLEN:-1000000}
      SNOWFLAKE_NODE_ID: ${SNOWFLAKE_NODE_ID:-1}
      SNOWFLAKE_EPOCH: ${SNOWFLAKE_EPOCH:-1704067200000}
      HASH_SALT: ${HASH_SALT:-change-this-salt}
      HASH_CODE_LENGTH: ${HASH_CODE_LENGTH:-8}
      MAX_SHORT_CODE_RETRIES: ${MAX_SHORT_CODE_RETRIES:-8}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-300}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: url-shortener-worker
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: ${WORKER_DATABASE_URL:-postgresql://postgres:postgres@db:5432/url_shortener}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_STREAM_NAME: ${REDIS_STREAM_NAME:-clicks}
      REDIS_CONSUMER_GROUP: ${REDIS_CONSUMER_GROUP:-analytics-workers}
      REDIS_CONSUMER_NAME: ${REDIS_CONSUMER_NAME:-worker-1}
      REDIS_BLOCK_MS: ${REDIS_BLOCK_MS:-5000}
      REDIS_BATCH_SIZE: ${REDIS_BATCH_SIZE:-200}
      REDIS_CLAIM_IDLE_MS: ${REDIS_CLAIM_IDLE_MS:-60000}
      REDIS_CLAIM_BATCH_SIZE: ${REDIS_CLAIM_BATCH_SIZE:-100}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: url-shortener-frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    healthcheck:
      test: ["CMD", "node", "healthcheck.cjs"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
